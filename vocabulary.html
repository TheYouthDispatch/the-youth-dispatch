<section style="text-align:center; padding:80px 10% 30px;">
    <h1>Vocabulary Flashcards</h1>
    <p style="opacity:.7;">Click through to study.</p>
</section>

<section style="display:flex; justify-content:center;">

  <div id="card" class="flashcard">

    <div id="flashInner" class="flashcard-inner">

        <div class="flashcard-front">

            <img id="frontImage" src="">

        </div>

        <div class="flashcard-back">

            <img id="backImage" src="">

        </div>

    </div>

</div>

</section>

<section style="text-align:center; margin-top:10px;">

    <button class="btn" onclick="nextCard()">Next Card</button>

</section>

<script>

const cards = [

{
    front:"flashcard-images/kenopsia-front.png",
    back:"flashcard-images/kenopsia-back.png"
},

{
    front:"flashcard-images/insouciant-front.png",
    back:"flashcard-images/insouciant-back.png"
},

{
    front:"flashcard-images/obfuscate-front.png",
    back:"flashcard-images/obfuscate-back.png"
}

];

let index = 0;
    let showingFront = true;

const flashcard = document.getElementById("card");

const frontImage = document.getElementById("frontImage");

const backImage = document.getElementById("backImage");

function loadCard(){

    frontImage.src = cards[index].front;

    backImage.src = cards[index].back;

    flashcard.classList.remove("flipped");

    showingFront = true;

}
   flashcard.onclick = function(){

    flashcard.classList.toggle("flipped");

    showingFront = !showingFront;

}
    
function nextCard(){

    index++;

    if(index >= cards.length){

        index = 0;

    }

    flashcard.classList.remove("flipped");

    loadCard();

}

loadCard();

</script>

</body>
