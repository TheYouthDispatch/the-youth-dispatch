</head>

<body>

<nav>
    <div class="logo-container">
        <img src="images/logo.png" class="logo-img">
        <div class="logo">THE YOUTH DISPATCH</div>

    <ul>

<section style="text-align:center; padding:80px 10% 30px;">
    <h1>Vocabulary Flashcards</h1>
    <p style="opacity:.7;">Click through to study.</p>
</section>

<section style="display:flex; justify-content:center;">

   <div id="card" style="
    background:#f4efe6;
    border-radius:20px;
    width:700px;
    height:500px;
    box-shadow:0 20px 40px rgba(0,0,0,.3);
    overflow:hidden;
    cursor:pointer;
">

    <img
        id="cardImage"
        src=""
        style="
            width:100%;
            height:100%;
            object-fit:contain;
            display:block;
        ">

</div>

</section>

<section style="text-align:center; margin-top:30px;">

    <button class="btn" onclick="nextCard()">Next Card</button>

</section>

<script>

const cards = [

{
    front:"flashcard-images/ephemeral-front.png",
    back:"flashcard-images/ephemeral-back.png"
},

{
    front:"flashcard-images/ubiquitous-front.png",
    back:"flashcard-images/ubiquitous-back.png"
},

{
    front:"flashcard-images/mitigate-front.png",
    back:"flashcard-images/mitigate-back.png"
}

];

let index = 0;
    let showingFront = true;

const cardImage = document.getElementById("cardImage");

function loadCard(){

    cardImage.src = cards[index].front;

    showingFront = true;

}

document.getElementById("card").onclick = function(){

    if(showingFront){

        cardImage.src = cards[index].back;

    }else{

        cardImage.src = cards[index].front;

    }

    showingFront = !showingFront;

}

function nextCard(){

    index++;

    if(index >= cards.length){

        index = 0;

    }

    loadCard();

}

loadCard();

</script>

</body>
