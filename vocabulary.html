<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vocabulary Flashcards | The Youth Dispatch</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<nav>
    <div class="logo-container">
        <img src="images/logo.png" class="logo-img">
        <div class="logo">THE YOUTH DISPATCH</div>
    </div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="articles.html">Articles</a></li>
        <li><a href="flashcards.html">Flashcards</a></li>
        <li><a href="opportunities.html">Opportunities</a></li>
        <li><a href="about.html">About</a></li>
    </ul>
</nav>

<section style="text-align:center; padding:80px 10% 30px;">
    <h1>Vocabulary Flashcards</h1>
    <p style="opacity:.7;">Click through to study.</p>
</section>

<section style="display:flex; justify-content:center;">

    <div id="card" style="
        background:#f4efe6;
        color:#2d241c;
        padding:60px;
        border-radius:20px;
        width:500px;
        text-align:center;
        box-shadow:0 20px 40px rgba(0,0,0,.3);
        cursor:pointer;
        user-select:none;
    ">

        <h2 id="word"></h2>

        <p id="definition" style="display:none;"></p>

        <p style="margin-top:30px; opacity:.5;">
            Click the card to flip it
        </p>

    </div>

</section>

<section style="text-align:center; margin-top:30px;">

    <button class="btn" onclick="nextCard()">Next Card</button>

</section>

<script>

const cards = [
    {
        word:"Ephemeral",
        definition:"Lasting a very short time."
    },
    {
        word:"Ubiquitous",
        definition:"Found everywhere."
    },
    {
        word:"Mitigate",
        definition:"To make less severe."
    }
];

let index = 0;
let showingWord = true;

const wordEl = document.getElementById("word");
const defEl = document.getElementById("definition");
const card = document.getElementById("card");

function loadCard(){

    wordEl.textContent = cards[index].word;
    defEl.textContent = cards[index].definition;

    wordEl.style.display="block";
    defEl.style.display="none";

    showingWord=true;

}

card.addEventListener("click",()=>{

    if(showingWord){

        wordEl.style.display="none";
        defEl.style.display="block";

    }else{

        wordEl.style.display="block";
        defEl.style.display="none";

    }

    showingWord=!showingWord;

});

function nextCard(){

    index++;

    if(index>=cards.length){

        index=0;

    }

    loadCard();

}

loadCard();

</script>

</body>
</html>
