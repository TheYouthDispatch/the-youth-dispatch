<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vocabulary Flashcards</title>

<link rel="stylesheet" href="../style.css">
</head>

<body>

<nav>
    <div class="logo-container">
        <img src="../images/logo.png" class="logo-img">
        <div class="logo">THE YOUTH DISPATCH</div>
    </div>

    <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../articles.html">Articles</a></li>
        <li><a href="../flashcards.html">Flashcards</a></li>
    </ul>
</nav>

<section style="text-align:center; padding:80px 10% 30px;">
    <h1>Vocabulary Flashcards</h1>
    <p style="opacity:0.7;">Click through to study</p>
</section>

<!-- FLASHCARD BOX -->
<section style="display:flex; justify-content:center;">

    <div id="card" style="
        background:#f4efe6;
        color:#2d241c;
        padding:60px;
        border-radius:20px;
        width:500px;
        text-align:center;
        box-shadow:0 20px 40px rgba(0,0,0,.3);
        cursor:pointer;
        user-select:none;
    ">

        <h2 id="word">Word</h2>
        <p id="definition">Definition</p>

        <p style="margin-top:30px; opacity:0.5;">Click to flip</p>

    </div>

</section>

<!-- BUTTONS -->
<section style="text-align:center; margin-top:30px;">

    <button class="btn" onclick="nextCard()">Next</button>

</section>

<script>
// ===== YOUR FLASHCARDS (EDIT THESE) =====
const cards = [
    { word: "Ephemeral", definition: "lasting a very short time" },
    { word: "Ubiquitous", definition: "found everywhere" },
    { word: "Candid", definition: "honest and straightforward" },
    { word: "Mitigate", definition: "make less severe" }
];

let index = 0;
let showingWord = true;

const wordEl = document.getElementById("word");
const defEl = document.getElementById("definition");
const card = document.getElementById("card");

// load first card
function loadCard() {
    wordEl.textContent = cards[index].word;
    defEl.textContent = cards[index].definition;
    showingWord = true;
}

// flip card
card.addEventListener("click", () => {
    if (showingWord) {
        defEl.style.display = "block";
        wordEl.style.display = "none";
        showingWord = false;
    } else {
        defEl.style.display = "none";
        wordEl.style.display = "block";
        showingWord = true;
    }
});

// next card
function nextCard() {
    index++;
    if (index >= cards.length) index = 0;
    loadCard();
}

// start
loadCard();
</script>

</body>
</html>
