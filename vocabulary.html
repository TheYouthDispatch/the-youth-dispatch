<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vocabulary Flashcards | The Youth Dispatch</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

.flashcard-container{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:20px;
}

.flashcard{

    width:450px;
    height:320px;

    background:#f4efe6;

    border-radius:20px;

    overflow:hidden;

    cursor:pointer;

    box-shadow:
    0 20px 40px rgba(0,0,0,.3);

}


#cardImage{

    width:100%;
    height:100%;

    object-fit:contain;

    display:block;

    transition:transform .35s ease;

}


.flashcard:hover{

    transform:translateY(-5px);

    transition:.3s ease;

}


.flash-buttons{

    text-align:center;

    margin-top:20px;

}

</style>

</head>

<body>


<nav>

    <div class="logo-container">

        <img src="images/logo.png" class="logo-img">

        <div class="logo">
            THE YOUTH DISPATCH
        </div>

    </div>


    <ul>

        <li><a href="index.html">Home</a></li>

        <li><a href="articles.html">Articles</a></li>

        <li><a href="flashcards.html">Flashcards</a></li>

        <li><a href="opportunities.html">Opportunities</a></li>

        <li><a href="about.html">About</a></li>

    </ul>

</nav>



<section style="text-align:center; padding:80px 10% 30px;">

    <h1>
        Vocabulary Flashcards
    </h1>

    <p style="opacity:.7;">
        Click the card to flip.
    </p>

</section>



<div class="flashcard-container">


    <div id="card" class="flashcard">

        <img id="cardImage" src="">


    </div>


</div>



<div class="flash-buttons">


    <button class="btn" onclick="nextCard()">
        Next Card
    </button>


</div>




<script>


const cards = [

{
    front:"flashcard-images/kenopsia-front.png",
    back:"flashcard-images/kenopsia-back.png"
},

{
    front:"flashcard-images/insouciant-front.png",
    back:"flashcard-images/insouciant-back.png"
},

{
    front:"flashcard-images/obfuscate-front.png",
    back:"flashcard-images/obfuscate-back.png"
}

];


let index = 0;

let showingFront = true;


const card = document.getElementById("card");

const cardImage = document.getElementById("cardImage");



function loadCard(){

    cardImage.src = cards[index].front;

    showingFront = true;

}



card.onclick = function(){


    cardImage.style.transform = "rotateY(90deg)";


    setTimeout(()=>{


        if(showingFront){

            cardImage.src = cards[index].back;

        }

        else{

            cardImage.src = cards[index].front;

        }


        showingFront = !showingFront;


        cardImage.style.transform = "rotateY(0deg)";


    },175);



}



function nextCard(){


    index++;


    if(index >= cards.length){

        index = 0;

    }


    loadCard();


}



loadCard();


</script>


</body>

</html>
